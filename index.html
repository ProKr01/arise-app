<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arise - Level Up</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-white min-h-screen p-4">
  <div class="max-w-md mx-auto">

    <header class="flex justify-between items-center mb-8">
      <h1 class="text-4xl font-black">ARISE ⚔️</h1>
      <div class="text-right">
        <div class="text-emerald-400 text-2xl" id="level">Lv. 1</div>
        <div id="xp">245 XP</div>
      </div>
    </header>

    <div class="bg-zinc-900 rounded-3xl p-6 mb-6">
      <p class="text-zinc-400">Hunter</p>
      <p id="name" class="text-2xl font-bold">ProKr</p>
      <p class="text-orange-400">🔥 7 day streak</p>
    </div>

    <div class="space-y-4 mb-8">
      <button onclick="completeQuest()" class="w-full bg-zinc-800 p-6 rounded-3xl text-left">
        🏆 Daily Quest (+50 XP)
      </button>

      <button onclick="logWorkout()" class="w-full bg-zinc-800 p-6 rounded-3xl text-left">
        🏋️ Log Workout (+35 XP)
      </button>

      <button onclick="showExercises()" class="w-full bg-zinc-800 p-6 rounded-3xl text-left">
        📋 Exercise List
      </button>

      <button onclick="generatePlan()" class="w-full bg-gradient-to-r from-purple-500 to-blue-500 p-6 rounded-3xl text-xl font-bold">
        ✨ Generate Plan
      </button>
    </div>

    <!-- Exercise Modal -->
    <div id="exerciseModal" class="hidden fixed inset-0 bg-black/80 flex items-end">
      <div class="bg-zinc-900 w-full rounded-t-3xl p-6 max-h-[80vh] overflow-auto">
        <h2 class="text-2xl font-bold mb-6">Exercise Vault</h2>
        <div class="space-y-6" id="exerciseList"></div>
        <button onclick="hideExercises()" class="mt-8 w-full bg-red-600 py-4 rounded-2xl">Close</button>
      </div>
    </div>
  </div>

  <script>
    let xp = 245, level = 1, name = "ProKr";

    const exercises = [
      {name: "Push-ups", desc: "3 sets of 15 reps • Chest & Arms"},
      {name: "Squats", desc: "4 sets of 12 reps • Legs"},
      {name: "Plank", desc: "3 rounds of 45 seconds • Core"},
      {name: "Lunges", desc: "3 sets of 10 each leg • Legs & Balance"},
      {name: "Pull-ups (or assisted)", desc: "3 sets • Back"},
    ];

    function update() {
      document.getElementById('xp').textContent = xp + " XP";
      document.getElementById('level').textContent = "Lv. " + level;
      document.getElementById('name').textContent = name;
    }

    function completeQuest() {
      xp += 50;
      if (xp >= level * 120) { level++; xp = 0; alert("🎉 LEVEL UP!"); }
      update();
      alert("Quest Complete!");
    }

    function logWorkout() {
      xp += 35;
      if (xp >= level * 120) { level++; xp = 0; alert("🎉 LEVEL UP!"); }
      update();
      alert("Workout Logged!");
    }

    function showExercises() {
      const container = document.getElementById('exerciseList');
      container.innerHTML = exercises.map(ex => `
        <div class="bg-zinc-800 p-5 rounded-2xl">
          <p class="font-bold text-lg">${ex.name}</p>
          <p class="text-zinc-400">${ex.desc}</p>
          <button onclick="logSingleExercise('${ex.name}')" class="mt-4 text-sm bg-emerald-600 px-6 py-2 rounded-xl">Log this exercise</button>
        </div>
      `).join('');
      document.getElementById('exerciseModal').classList.remove('hidden');
    }

    function hideExercises() {
      document.getElementById('exerciseModal').classList.add('hidden');
    }

    function logSingleExercise(name) {
      xp += 25;
      if (xp >= level * 120) { level++; xp = 0; alert("🎉 LEVEL UP!"); }
      update();
      alert(`Logged ${name}! +25 XP`);
    }

    function generatePlan() {
      alert("🧠 Personalized Plan:\n\nPush Day\n- Push-ups\n- Shoulder Press\n- Tricep Dips");
    }

    update();
  </script>
</body>
</html>
