<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arise</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-white min-h-screen p-4">
  <div class="max-w-md mx-auto">

    <div class="flex justify-between items-center mb-8">
      <h1 class="text-4xl font-black">ARISE ⚔️</h1>
      <div class="text-right">
        <div class="text-emerald-400 text-2xl" id="level">Lv. 1</div>
        <div id="xp">245 XP</div>
      </div>
    </div>

    <div class="bg-zinc-900 rounded-3xl p-6 mb-6">
      <p class="text-zinc-400">Hunter</p>
      <p id="name" class="text-2xl font-bold">ProKr</p>
      <p class="text-orange-400">🔥 7 day streak</p>
    </div>

    <div class="space-y-4">
      <button onclick="completeQuest()" class="w-full bg-zinc-800 hover:bg-zinc-700 p-6 rounded-3xl text-left">
        🏆 Daily Quest<br>
        <span class="text-emerald-400">+50 XP</span>
      </button>

      <button onclick="logWorkout()" class="w-full bg-zinc-800 hover:bg-zinc-700 p-6 rounded-3xl text-left">
        🏋️ Log Workout<br>
        <span class="text-purple-400">+35 XP</span>
      </button>

      <button onclick="generatePlan()" class="w-full bg-gradient-to-r from-purple-500 to-blue-500 p-6 rounded-3xl text-xl font-bold">
        ✨ Generate Plan
      </button>
    </div>
  </div>

  <script>
    let xp = 245, level = 1, name = "ProKr";

    function update() {
      document.getElementById('xp').textContent = xp + " XP";
      document.getElementById('level').textContent = "Lv. " + level;
      document.getElementById('name').textContent = name;
    }

    function completeQuest() {
      xp += 50;
      if (xp >= level * 120) { level++; xp = 0; alert("LEVEL UP!"); }
      update();
      alert("Quest Complete!");
    }

    function logWorkout() {
      xp += 35;
      if (xp >= level * 120) { level++; xp = 0; alert("LEVEL UP!"); }
      update();
      alert("Workout Logged!");
    }

    function generatePlan() {
      alert("Personalized Plan:\nPush-ups, Squats, Plank");
    }

    update();
  </script>
</body>
</html>
