<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ProKr++ Profile</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-zinc-950 text-white min-h-screen p-4">

<div class="max-w-md mx-auto">

  <h1 class="text-4xl font-black mb-8">
    Profile ⚔️
  </h1>

  <div class="bg-zinc-900 rounded-3xl p-6">

    <p class="text-zinc-400">
      Hunter Name
    </p>

    <h2 class="text-3xl font-bold">
      ProKr
    </h2>

    <div class="mt-6">
      <p class="text-emerald-400 text-2xl" id="level">
        Lv. 1
      </p>

      <p id="xp">
        0 XP
      </p>
    </div>

    <div class="mt-6">
      <p>🔥 Streak</p>
      <p class="text-xl font-bold">
        7 Days
      </p>
    </div>

    <div class="mt-6">
      <p>🏆 Achievements</p>

      <ul class="mt-2 text-zinc-300">
        <li>⚔️ First Quest</li>
        <li>🔥 7 Day Warrior</li>
        <li>💪 Workout Starter</li>
      </ul>

    </div>

  </div>

</div>

<script>
let xp = localStorage.getItem("xp") || 0;
let level = localStorage.getItem("level") || 1;

document.getElementById("xp").textContent = xp + " XP";
document.getElementById("level").textContent = "Lv. " + level;
</script>

</body>
</html>
